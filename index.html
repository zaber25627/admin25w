<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin Panel</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        :root { --primary: #8b5cf6; --bg: #0f0f23; --card: #1e1e30; --text: #fff; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .container { max-width: 600px; margin: 0 auto; }
        h2 { text-align: center; color: #d8b4fe; margin-bottom: 20px; }
        .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .dash-btn { background: var(--card); border: 1px solid #333; padding: 20px; border-radius: 15px; text-align: center; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .dash-btn i { font-size: 28px; color: var(--primary); }
        .section { display: none; }
        .section.active { display: block; }
        .header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .back-btn { background: none; border: none; color: white; font-size: 18px; cursor: pointer; }
        input, select, textarea { width: 100%; padding: 14px; margin-bottom: 10px; background: #151525; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; }
        .action-btn { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; }
        .list-item { background: var(--card); padding: 12px; margin-top: 10px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        .del-btn { background: #ef4444; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
        .help-text { font-size: 12px; color: #9ca3af; margin-bottom: 5px; display: block; }
    </style>
</head>
<body>

<div class="container">
    <div id="dashboard">
        <h2>👑 Admin Control</h2>
        <div class="dashboard-grid">
            <div class="dash-btn" onclick="openSection('secVideo')"><i class="fas fa-video"></i> <span>ভিডিও আপলোড</span></div>
            <div class="dash-btn" onclick="openSection('secAds')"><i class="fas fa-sack-dollar"></i> <span>অ্যাড সেটআপ</span></div>
            <div class="dash-btn" onclick="openSection('secCat')"><i class="fas fa-tags"></i> <span>ক্যাটাগরি</span></div>
            <div class="dash-btn" onclick="openSection('secLinks')"><i class="fas fa-link"></i> <span>মেনু লিংক</span></div>
            <div class="dash-btn" onclick="openSection('secSettings')"><i class="fas fa-cogs"></i> <span>সেটিংস</span></div>
        </div>
    </div>

    <!-- 1. VIDEO UPLOAD -->
    <div id="secVideo" class="section">
        <div class="header-row"><button class="back-btn" onclick="goHome()"><i class="fas fa-arrow-left"></i></button><h3>🎬 ভিডিও আপলোড</h3><div></div></div>
        <label class="help-text">নাম</label><input type="text" id="vTitle" placeholder="Video Title">
        <label class="help-text">ছবি (URL)</label><input type="text" id="vImage" placeholder="https://...">
        <label class="help-text">লিংক</label><input type="text" id="vLink" placeholder="Download link...">
        <div style="display:flex; gap:10px;">
            <select id="vCat" style="flex:1"><option value="all">Category</option></select>
            <input type="number" id="vReq" value="1" style="flex:1" placeholder="Ads Count">
        </div>
        <button class="action-btn" onclick="uploadVideo()">PUBLISH VIDEO</button>
        <div id="vList" style="margin-top:20px"></div>
    </div>

    <!-- 2. ADS SETUP (Updated for Monetag) -->
    <div id="secAds" class="section">
        <div class="header-row"><button class="back-btn" onclick="goHome()"><i class="fas fa-arrow-left"></i></button><h3>💰 অ্যাড সেটআপ</h3><div></div></div>
        
        <div style="background:#252538; padding:10px; border-radius:10px; margin-bottom:15px; border:1px solid #ec4899;">
            <h4 style="margin:0 0 10px; color:#ec4899;">🚀 Monetag (2nd Ad)</h4>
            <label class="help-text">Zone ID (Example: 10110498)</label>
            <input type="number" id="monetagId" placeholder="10110498">
            <button class="action-btn" style="padding:8px;" onclick="saveMonetag()">Save Monetag ID</button>
        </div>

        <div style="background:#252538; padding:10px; border-radius:10px; margin-bottom:15px;">
            <h4 style="margin:0 0 10px; color:#fff;">Adsgram Block ID</h4>
            <input type="text" id="adsgramId" placeholder="Example: 12345">
            <button class="action-btn" style="padding:8px;" onclick="addAdsgramId()">Add ID</button>
            <div id="adsgramList"></div>
        </div>

        <div style="background:#252538; padding:10px; border-radius:10px;">
            <h4 style="margin:0 0 10px; color:#a855f7;">Banner Ads (HTML)</h4>
            <textarea id="bannerCode" style="height:60px" placeholder='<a href="..."><img src="..."></a>'></textarea>
            <button class="action-btn" style="padding:8px;" onclick="addBanner()">Add Banner</button>
            <div id="bannerList"></div>
        </div>
    </div>

    <!-- 3. CATEGORY -->
    <div id="secCat" class="section">
        <div class="header-row"><button class="back-btn" onclick="goHome()"><i class="fas fa-arrow-left"></i></button><h3>🏷️ ক্যাটাগরি</h3><div></div></div>
        <input type="text" id="cId" placeholder="ID (viral)">
        <input type="text" id="cName" placeholder="Name (ভাইরাল)">
        <button class="action-btn" onclick="addCategory()">Add</button>
        <div id="catList"></div>
    </div>

    <!-- 4. LINKS -->
    <div id="secLinks" class="section">
        <div class="header-row"><button class="back-btn" onclick="goHome()"><i class="fas fa-arrow-left"></i></button><h3>🔗 লিংক</h3><div></div></div>
        <input type="text" id="lTitle" placeholder="Title">
        <input type="text" id="lUrl" placeholder="URL">
        <button class="action-btn" onclick="addLink()">Add</button>
        <div id="linkList"></div>
    </div>

    <!-- 5. SETTINGS -->
    <div id="secSettings" class="section">
        <div class="header-row"><button class="back-btn" onclick="goHome()"><i class="fas fa-arrow-left"></i></button><h3>⚙️ সেটিংস</h3><div></div></div>
        <label class="help-text">Telegram Bot App Link (Direct Link)</label>
        <input type="text" id="sBot" placeholder="https://t.me/your_bot/app">
        <label class="help-text">Tutorial ID (Youtube)</label>
        <input type="text" id="sTut">
        <label class="help-text">Daily Limit</label>
        <input type="number" id="sLimit">
        <button class="action-btn" onclick="saveSettings()">Save</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

    const firebaseConfig = {
  apiKey: "AIzaSyA3n1rj2ZGwMtWVryH1l7xniDRy9GTm6Yo",
  authDomain: "viralxxbd1311.firebaseapp.com",
  databaseURL: "https://viralxxbd1311-default-rtdb.firebaseio.com",
  projectId: "viralxxbd1311",
  storageBucket: "viralxxbd1311.firebasestorage.app",
  messagingSenderId: "176856433458",
  appId: "1:176856433458:web:478ba46d5c8a17193e4d2b"
};

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    window.openSection = (id) => { document.getElementById('dashboard').style.display='none'; document.querySelectorAll('.section').forEach(d=>d.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    window.goHome = () => { document.querySelectorAll('.section').forEach(d=>d.classList.remove('active')); document.getElementById('dashboard').style.display='block'; }
    window.del = (path) => { if(confirm('Delete?')) remove(ref(db, path)); }

    // VIDEO
    window.uploadVideo = () => {
        const t=document.getElementById('vTitle').value, i=document.getElementById('vImage').value, l=document.getElementById('vLink').value;
        if(t&&i&&l) push(ref(db, 'videos'), { name:t, image_url:i, download_link:l, category:document.getElementById('vCat').value, ad_watches_required:parseInt(document.getElementById('vReq').value), created_at:Date.now() }).then(()=>alert('Done!'));
    }
    onValue(ref(db, 'videos'), s=>{ 
        const d=document.getElementById('vList'); d.innerHTML=''; 
        if(s.val()) Object.entries(s.val()).reverse().forEach(([k,v])=>d.innerHTML+=`<div class="list-item"><img src="${v.image_url}" width="30"> <span>${v.name}</span> <button class="del-btn" onclick="del('videos/${k}')">X</button></div>`); 
    });

    // ADS (Monetag Added)
    window.saveMonetag = () => {
        const mid = document.getElementById('monetagId').value;
        update(ref(db, 'settings'), { monetag_id: mid }).then(()=>alert('Monetag ID Saved!'));
    }
    
    window.addAdsgramId = () => { const v=document.getElementById('adsgramId').value; if(v) push(ref(db, 'ads_config/interstitial_ids'), v); }
    onValue(ref(db, 'ads_config/interstitial_ids'), s=>{
        const d=document.getElementById('adsgramList'); d.innerHTML='';
        if(s.val()) Object.entries(s.val()).forEach(([k,v])=>d.innerHTML+=`<div class="list-item"><span>${v}</span><button class="del-btn" onclick="del('ads_config/interstitial_ids/${k}')">X</button></div>`);
    });
    window.addBanner = () => { const v=document.getElementById('bannerCode').value; if(v) push(ref(db, 'ads_config/banners'), v); }
    onValue(ref(db, 'ads_config/banners'), s=>{
        const d=document.getElementById('bannerList'); d.innerHTML='';
        if(s.val()) Object.entries(s.val()).forEach(([k,v])=>d.innerHTML+=`<div class="list-item"><small>${v.substring(0,20)}...</small><button class="del-btn" onclick="del('ads_config/banners/${k}')">X</button></div>`);
    });

    // SETTINGS (Load Monetag)
    window.saveSettings=()=>{ 
        update(ref(db,'settings'),{
            tutorial_id:document.getElementById('sTut').value, 
            ads_limit:parseInt(document.getElementById('sLimit').value),
            bot_app_link:document.getElementById('sBot').value
        }).then(()=>alert('Settings Saved')); 
    }
    onValue(ref(db,'settings'),s=>{ 
        if(s.val()){ 
            document.getElementById('sTut').value=s.val().tutorial_id||''; 
            document.getElementById('sLimit').value=s.val().ads_limit||20;
            document.getElementById('sBot').value=s.val().bot_app_link||'';
            document.getElementById('monetagId').value=s.val().monetag_id||'';
        }
    });

    // OTHERS
    window.addCategory=()=>{ const i=document.getElementById('cId').value,n=document.getElementById('cName').value; if(i&&n) push(ref(db,'filters'),{id:i,name:n}); }
    onValue(ref(db,'filters'),s=>{
        const d=document.getElementById('catList'), sel=document.getElementById('vCat'); d.innerHTML=''; sel.innerHTML='<option value="all">All</option>';
        if(s.val()) Object.entries(s.val()).forEach(([k,v])=>{ d.innerHTML+=`<div class="list-item"><span>${v.name}</span><button class="del-btn" onclick="del('filters/${k}')">X</button></div>`; sel.innerHTML+=`<option value="${v.id}">${v.name}</option>`; });
    });
    window.addLink=()=>{ const t=document.getElementById('lTitle').value,u=document.getElementById('lUrl').value; if(t&&u) push(ref(db,'links'),{title:t,url:u}); }
    onValue(ref(db,'links'),s=>{ const d=document.getElementById('linkList'); d.innerHTML=''; if(s.val()) Object.entries(s.val()).forEach(([k,v])=>d.innerHTML+=`<div class="list-item"><span>${v.title}</span><button class="del-btn" onclick="del('links/${k}')">X</button></div>`); });
</script>
</body>
</html>
